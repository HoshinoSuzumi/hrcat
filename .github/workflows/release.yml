name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: corepack enable && corepack install

      - run: pnpm install --frozen-lockfile

      - name: Check npm package availability
        id: npm_publish_access
        run: |
          if npm view @hrcat/cli version >/dev/null 2>&1 && npm view @hrcat/plugin version >/dev/null 2>&1; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::@hrcat packages are not available in npm registry yet. Skipping publish for this run."
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Pull Request or Publish
        if: steps.npm_publish_access.outputs.can_publish == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm exec changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create Release Pull Request
        if: steps.npm_publish_access.outputs.can_publish != 'true'
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
